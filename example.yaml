esphome:
  name: esp32-tailscale
  friendly_name: "ESP32 Tailscale"
  platformio_options:
    extra_scripts:
      - pre:C:/devuser2/esphome_tailscale/components/tailscale/patch_cmake.py
    build_flags:
      - "-include C:/devuser2/esphome_tailscale/idf_components/microlink/ml_config_override.h"
      - "-DWG_DEBUG_LOGGING=1"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_LWIP_IP_FORWARD: "y"
      CONFIG_LWIP_NETIF_LOOPBACK: "y"
      CONFIG_ESP_WIFI_SOFTAP_SUPPORT: "n"
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_ESP_TLS_INSECURE: "y"
      CONFIG_ESP_TLS_SKIP_SERVER_CERT_VERIFY: "y"
      CONFIG_MBEDTLS_CERTIFICATE_BUNDLE: "y"
      CONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_FULL: "y"
      CONFIG_LWIP_IPV6: "y"
      CONFIG_LWIP_IPV6_AUTOCONFIG: "y"
      CONFIG_LWIP_CHECK_THREAD_SAFETY: "n"
      CONFIG_MBEDTLS_CHACHAPOLY_C: "y"
      CONFIG_MBEDTLS_CHACHA20_C: "y"
      CONFIG_MBEDTLS_POLY1305_C: "y"
      CONFIG_MBEDTLS_HKDF_C: "y"
      CONFIG_ML_MAX_PEERS: "16"
      CONFIG_ML_H2_BUFFER_SIZE_KB: "512"
      CONFIG_ML_JSON_BUFFER_SIZE_KB: "512"
      CONFIG_ML_NVS_MAX_PEERS: "64"

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source: components

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG
  hardware_uart: UART0

api:

ota:
  platform: esphome

tailscale:
  auth_key: !secret tailscale_auth_key
  hostname: "esp32-tailscale"
  enable_derp: true
  enable_stun: true
  enable_disco: true
  max_peers: 16

binary_sensor:
  - platform: tailscale
    connected:
      name: "Tailscale Connected"

text_sensor:
  - platform: tailscale
    ip_address:
      name: "Tailscale IP"
    tailscale_hostname:
      name: "Tailscale Hostname"

sensor:
  - platform: tailscale
    peer_count:
      name: "Tailscale Peers"
