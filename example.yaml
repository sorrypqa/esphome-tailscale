esphome:
  name: esp32-tailscale
  friendly_name: "ESP32 Tailscale"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

external_components:
  - source: components

# For production use (not local dev):
# packages:
#   tailscale: github://Csontikka/esphome-tailscale/packages/tailscale/tailscale.yaml@main

tailscale:
  auth_key: !secret tailscale_auth_key
  hostname: "esp32-tailscale"
  # max_peers: 16  # Optional, default 16

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # use_address: "100.x.x.x"  # Set to your Tailscale VPN IP after first boot

time:
  - platform: sntp
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

logger:
  level: DEBUG
  hardware_uart: UART0

api:

web_server:
  port: 80

ota:
  platform: esphome

binary_sensor:
  - platform: tailscale

text_sensor:
  - platform: tailscale

sensor:
  - platform: tailscale
