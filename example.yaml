esphome:
  name: esp32-tailscale
  friendly_name: "ESP32 Tailscale"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Pull the tailscale component + all entities from the GitHub package.
# This is exactly what an end user would do — guarantees the build output
# matches what users get when they include the package. `refresh: always`
# disables the default 1-day cache so dev flashes always see the latest main.
packages:
  tailscale:
    url: https://github.com/Csontikka/esphome-tailscale
    ref: main
    refresh: always
    files:
      - packages/tailscale/tailscale.yaml

# PSRAM init — required by the Tailscale stack. quad/40MHz is the safe
# default that works on every ESP32-S3 PSRAM variant:
#   - N8R2 / N16R2 (2 MB Quad PSRAM): native speed
#   - N8R8 / N16R8 (8 MB Octal PSRAM): runs at half bandwidth, still fast
#     enough for the Tailscale workload — network is the bottleneck.
# For maximum throughput on octal modules, set `mode: octal speed: 80MHz`.
psram:
  mode: quad
  speed: 40MHz

tailscale:
  auth_key: !secret tailscale_auth_key
  hostname: "esp32-tailscale"
  # max_peers: 16  # Optional, default 16
  # login_server: "http://192.168.1.42:8080"  # Optional, for Headscale / self-hosted control plane
  #                                           # See contrib/headscale-test/ for a local docker-compose

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # use_address: "100.x.x.x"  # Set to your Tailscale VPN IP after first boot

logger:
  level: DEBUG
  hardware_uart: UART0

api:

web_server:
  port: 80

ota:
  platform: esphome
