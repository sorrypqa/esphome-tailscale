esphome:
  name: esp32-tailscale
  friendly_name: "ESP32 Tailscale"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source: components

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG
  hardware_uart: UART0

api:

ota:
  platform: esphome

tailscale:
  auth_key: !secret tailscale_auth_key
  hostname: "esp32-tailscale"

binary_sensor:
  - platform: tailscale
    connected:
      name: "Tailscale Connected"

text_sensor:
  - platform: tailscale
    ip_address:
      name: "Tailscale IP"
    tailscale_hostname:
      name: "Tailscale Hostname"

sensor:
  - platform: tailscale
    peer_count:
      name: "Tailscale Peers"
