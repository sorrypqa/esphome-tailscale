external_components:
  - source:
      type: git
      url: https://github.com/Csontikka/esphome-tailscale.git
      ref: main
    components: [tailscale]
    refresh: 0s

time:
  - platform: sntp
    id: tailscale_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

binary_sensor:
  - platform: tailscale
    connected:
      name: "VPN Connected"
    key_expiry_warning:
      name: "VPN Key Expiry Warning"
    ha_connected:
      name: "HA API Connected"
    vpn_auto_rollback:
      name: "VPN Auto-Rollback"

text_sensor:
  - platform: tailscale
    ip_address:
      name: "VPN IP"
    vpn_hostname:
      name: "VPN Hostname"
    memory_mode:
      name: "Device Memory"
    setup_status:
      name: "VPN Setup Hint"
    peer_status:
      name: "VPN Peer Status"
    magicdns:
      name: "VPN MagicDNS"
    network_name:
      name: "VPN Network"
    key_expiry:
      name: "VPN Key Expiry"
    ha_connection_route:
      name: "HA API Connection Route"
    ha_connection_ip:
      name: "HA API Connection IP"
    control_plane:
      name: "VPN Control Plane"
    login_server:
      name: "VPN Login Server"
    auth_key_status:
      name: "VPN Auth Key Status"

text:
  - platform: tailscale
    auth_key:
      name: "VPN Auth Key"
      mode: password

button:
  - platform: tailscale
    reconnect:
      name: "VPN Reconnect"
  - platform: restart
    name: "Reboot"

sensor:
  - platform: tailscale
    peers_online:
      name: "VPN Peers Online"
    peers_direct:
      name: "VPN Peers Direct"
    peers_derp:
      name: "VPN Peers DERP"
    peers_max:
      name: "VPN Peers Max"
    uptime:
      name: "VPN Uptime"
    connections:
      name: "VPN Connect Count"

switch:
  - platform: tailscale
    vpn_enabled:
      name: "VPN Enabled"
    debug_log:
      name: "VPN Debug Log"
      restore_mode: RESTORE_DEFAULT_OFF
