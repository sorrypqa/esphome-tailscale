esphome:
  name: esp32-tailscale-dev
  friendly_name: "ESP32 Tailscale (dev)"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# Load the tailscale component from your local checkout instead of GitHub.
# Every compile uses the current working-tree copy of components/tailscale,
# so you can edit the Python schema or C++ code and see it immediately.
# This is the file to use when you are modifying the component itself.
external_components:
  - source: components

# Entity definitions (mirrored from packages/tailscale/tailscale.yaml).
# Kept inline here so that this file is fully self-contained for dev work.
# If you add a new entity to the package, also add it here.
time:
  - platform: sntp
    id: tailscale_time
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

binary_sensor:
  - platform: tailscale
    connected:
      name: "Tailscale Connected"
    key_expiry_warning:
      name: "Tailscale Key Expiry Warning"

text_sensor:
  - platform: tailscale
    ip_address:
      name: "Tailscale IP"
    tailscale_hostname:
      name: "Tailscale Hostname"
    memory_mode:
      name: "Tailscale Memory"
    setup_status:
      name: "Tailscale Setup Hint"
    peer_status:
      name: "Tailscale Peer Status"
    magicdns:
      name: "Tailscale MagicDNS"
    tailnet_name:
      name: "Tailscale Tailnet"
    key_expiry:
      name: "Tailscale Key Expiry"
    ha_connection_route:
      name: "HA Connection Route"

button:
  - platform: tailscale
    reconnect:
      name: "Tailscale Reconnect"
  - platform: restart
    name: "Reboot"

sensor:
  - platform: tailscale
    peers_online:
      name: "Tailscale Peers Online"
    peers_direct:
      name: "Tailscale Peers Direct"
    peers_derp:
      name: "Tailscale Peers DERP"
    peers_max:
      name: "Tailscale Peers Max"
    uptime:
      name: "Tailscale Uptime"

switch:
  - platform: tailscale
    tailscale_enabled:
      name: "Tailscale Enabled"

tailscale:
  auth_key: !secret tailscale_auth_key
  hostname: "esp32-tailscale-dev"
  # max_peers: 16  # Optional, default 16

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # use_address: "100.x.x.x"  # Set to your Tailscale VPN IP after first boot

logger:
  level: DEBUG
  hardware_uart: UART0

api:

web_server:
  port: 80

ota:
  platform: esphome
