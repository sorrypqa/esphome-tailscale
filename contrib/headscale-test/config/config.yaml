---
# Minimal Headscale config for local ESPHome Tailscale component testing.
# This is NOT a production config. Do not expose port 8080 to the public internet.

# NOTE: port 80 is not arbitrary — microlink hardcodes TCP 80 for the
# control plane (see microlink/components/microlink/src/ml_coord.c:230),
# so this harness must listen there for the Upgrade request to reach the
# Noise handler. Nothing else on the host may be holding port 80.
server_url: http://HOST_LAN_IP
listen_addr: 0.0.0.0:80
metrics_listen_addr: 0.0.0.0:9090

grpc_listen_addr: 0.0.0.0:50443
grpc_allow_insecure: false

noise:
  private_key_path: /var/lib/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

derp:
  server:
    enabled: false
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  auto_update_enabled: true
  update_frequency: 24h

disable_check_updates: true
ephemeral_node_inactivity_timeout: 30m

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite

log:
  format: text
  level: debug

dns:
  override_local_dns: false
  magic_dns: true
  base_domain: esp32test.local
  nameservers:
    global:
      - 1.1.1.1
      - 9.9.9.9

unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"

logtail:
  enabled: false

randomize_client_port: false
